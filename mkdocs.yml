site_name: BlinkUI
site_description: Build mobile apps in pure Python
site_url: https://feranmi1295.github.io/blinkui
repo_url: https://github.com/feranmi1295/blinkui
repo_name: feranmi1295/blinkui

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Guide:
    - Getting Started: guide/getting-started.md
    - State Management: guide/state.md
    - Navigation: guide/navigation.md
    - Theming: guide/theming.md
    - HTTP Client: guide/http.md
    - Storage: guide/storage.md
  - Components:
    - Layout: components/layout.md
    - Text: components/text.md
    - Button: components/button.md
    - Input: components/input.md
    - Card & Overlay: components/card.md
    - Navigation: components/navigation.md
    - Image: components/image.md
  - API Reference:
    - Screen: api/screen.md
    - Router: api/router.md
    - Theme: api/theme.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html