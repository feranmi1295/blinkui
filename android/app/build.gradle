apply plugin: 'com.android.application'

android {
    compileSdk 36
    namespace "com.blinkui"

    defaultConfig {
        applicationId    "com.blinkui.app"
        minSdk           24
        targetSdk        36
        versionCode      1
        versionName      "0.1.0"

        externalNativeBuild {
            cmake {
                cppFlags ""
                arguments "-DANDROID_STL=c++_shared"
            }
        }

        ndk {
            abiFilters "arm64-v8a", "x86_64"
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/jni/CMakeLists.txt"
            version "3.22.1"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}